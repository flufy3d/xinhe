# ============================================================
# Persona Unified — Qwen3.5-0.8B 版本
#
# 前置：
#   1. export DEEPSEEK_API_KEY=...（或加到 .env）
#   2. python scripts/build_chat_cache.py   → data/cache/*.jsonl
#   3. python scripts/build_val_sets.py     → data/val/*.jsonl
#
# 用法（端到端 2 stage，无需 --resume）：
#   python scripts/train.py --config configs/persona_unified.yaml
#
# Stage 0 bootstrap (~1000-1500 步) → Stage 1 主训 (~3000-5000 步) → 总 ~5000-6500 步收敛
# ============================================================
base: qwen3.5-0.8b.yaml
curriculum_file: curriculum_persona.yaml

data:
  val_worldqa_path: "data/val/val_worldqa.jsonl"
  val_refusal_path: "data/val/val_refusal.jsonl"
  val_compositional_path: "data/val/val_compositional.jsonl"

stage_overrides:
  default:
    batch_size: 2
    grad_accum_steps: 2
  0_bootstrap:
    batch_size: 8        # 2 轮短 ep，显存富裕
    grad_accum_steps: 1
