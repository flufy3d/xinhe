# 课程:skeleton(骨架混合) → dialog(5-Beat) → mix(联合巩固)

training_defaults:
  learning_rate: 3.0e-4
  grad_clip: 1.0
  gradient_checkpointing: true
  log_every: 10
  eval_every: 1000
  save_every: 1000

stages:
  - name: "0_atomic_skeletons"
    data:
      kind: "skeleton"
      skeleton_weights:
        S1: 1.0
        S2: 0.6
        S3: 0.8
        S4: 0.8
        S5: 1.6   # 合并自原 S5+S6,K 池含陈述/疑问两种句式
        S7: 1.0
        S8: 0.5
        S9: 0.6
        S10: 0.8
        S11: 0.8
      distance_bucket:
        near: 0.20
        mid: 0.35
        far: 0.30
        very_far: 0.15
      num_train: 100000
      num_val: 1000
      seed: 42
      out_dir: "data/skeleton"
    training:
      max_turns_per_episode: 12
      turn_max_tokens: 256
      freeze_lora: false
      plugin_lr_multiplier: 1.0
      max_steps: 6000
      warmup_steps: 200
      use_joint_early_stop: true
      early_stop:
        skeleton_val_overall: 0.90
        skeleton_val_S1: 0.95     # 简单单 fact 写读
        skeleton_val_S5: 0.85     # 覆写后 stale-read 对抗
        skeleton_val_S7: 0.85     # 多写 + 部分覆写 + 走神 + 全读(实战最像)
        skeleton_val_S10: 0.85    # 反向删除
        skeleton_val_S11: 0.80    # 多写部分删除(最难)
    val_sets:
      - {name: "skeleton_val", path: "data/skeleton/val.jsonl"}

  - name: "1_5beat_natural"
    data:
      kind: "dialog"
      mix:
        "1A": 1.00
      n_canonical_range: [1, 3]
      n_turns_range: [10, 14]
      beat3_min_turns: 1
      beat3_min_chars: 450
      beat3_chars_tolerance: 0.56
      num_train: 30000
      num_val: 500
      seed: 43
      workers: 4
      model: "deepseek-v4-flash"
      out_dir: "data/dialog"
    training:
      freeze_lora: false
      plugin_lr_multiplier: 0.3
      max_turns_per_episode: 16
      turn_max_tokens: 256
      max_steps: 10000
      warmup_steps: 200
      use_joint_early_stop: true
      early_stop:
        dialog_val_overall: 0.88
        dialog_val_substream_1A: 0.90
        dialog_val_substream_1B: 0.78
        dialog_val_tier_hard: 0.92
        # 注: 数据里没有 tier_soft,从未触发,移除避免误导
    val_sets:
      - {name: "dialog_val", path: "data/dialog/val.jsonl"}

  - name: "2_joint_consolidation"
    data:
      kind: "mix"
      sources:
        - {path: "data/skeleton/train.jsonl", ratio: 0.15, tag: "skeleton"}
        - {path: "data/dialog/train.jsonl",   ratio: 0.85, tag: "dialog"}
      num_train: 20000
      num_val: 500
      seed: 44
      out_dir: "data/mix"
    training:
      freeze_lora: false
      plugin_lr_multiplier: 0.5
      max_turns_per_episode: 16
      turn_max_tokens: 256
      max_steps: 4000
      warmup_steps: 100
      use_joint_early_stop: true
      early_stop:
        skeleton_val_overall: 0.85
        dialog_val_overall: 0.85
    val_sets:
      - {name: "skeleton_val", path: "data/skeleton/val.jsonl"}
      - {name: "dialog_val", path: "data/dialog/val.jsonl"}
