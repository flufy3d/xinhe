# ============================================================
# 基础记忆课程 (v5c: Delta Rule 联想记忆 W)
#
# 设计原则:
#   Phase A (stage 0-5): 短 turn + 快 + 专注 多 entity × 多 fact × 两者混合
#     验收点: stage 5 VALUE ≥ 95% on 3-entity same_cat=0.5 → 核心已过
#   Phase B (stage 6-9): 中 turn, recall + ai_recall + 更难混合
#   Phase C (stage 10-12): 长 turn, 全混合收官
#
# 关键变化 vs v5b:
#   - 架构换为 Delta Rule: error=(v-Wk) 原生处理同类消歧 + 覆写
#   - contrastive_weight 全部删除（slot 概念已消失，靠 Delta Rule 自带数学）
#   - 课程难度/顺序/max_steps 保持不变，让架构在同课程下对比
#
# 用法:
#   python scripts/train.py --config configs/curriculum_qwen3.5-0.8b.yaml
# ============================================================

training_defaults:
  episode_length: 5
  tbptt_steps: 5
  learning_rate: 3.0e-4
  plugin_lr_multiplier: 1.0
  grad_accum_steps: 1
  max_steps: 2000
  # v5c Phase A 目标：VALUE ≥ 99% 切 stage（Phase A 要求 99%+）
  early_stop_value: 0.99

stages:
  # ================================================================
  # Phase A: 短 turn (2-5) + 多 entity + 多 fact + 混合
  # ================================================================

  # ── Stage 0: State bootstrap (1 fact, 2 轮) ──
  # v5c: VALUE/FRAME 在 step 500 已达 95%/97%，之后 loss 被 TELL frozen-LoRA
  # baseline 锚定无法下降，1500 步浪费。1000 步余量够。
  - name: "0_bootstrap"
    data:
      num_train: 10000
      num_facts: 1
      categories: ["name"]
      no_pre_filler: true
      no_overwrite: true
      min_distance: 0
      max_distance: 0
      max_turns: 2
    training:
      episode_length: 2
      tbptt_steps: 2
      freeze_lora: true
      max_steps: 1000

  # ── Stage 1: 基础跨轮保持 (1 fact, 4 轮) ──
  - name: "1_distance1"
    data:
      num_train: 10000
      num_facts: 1
      no_pre_filler: true
      no_overwrite: true
      min_distance: 1
      max_distance: 1
      max_turns: 4
    training:
      episode_length: 4
      tbptt_steps: 4
      max_steps: 1500

  # ── Stage 2: 不同类 entity (2 entity, 易 routing 热身) ──
  # max_steps 减到 1500 防 Adam 末期 LR 低 + v_hat 小时 spike 崩盘 (v5f 实测)
  - name: "2_entity_diff"
    data:
      num_train: 10000
      num_facts: 2
      entity_ratio: 1.0
      same_category: 0.0
      no_pre_filler: true
      no_overwrite: true
      min_distance: 1
      max_distance: 1
      max_turns: 4
    training:
      episode_length: 4
      tbptt_steps: 4
      max_steps: 1500
  # ── Stage 3: 同类 entity (2 entity same_cat=1.0, 硬 routing 第一关) ──
  - name: "3_entity_same"
    data:
      num_train: 15000
      num_facts: 2
      entity_ratio: 1.0
      same_category: 1.0
      no_overwrite: true
      min_distance: 1
      max_distance: 2
      max_turns: 5
    training:
      episode_length: 5
      tbptt_steps: 5
      max_steps: 3000
  # ── Stage 4: 3 facts + 中度 entity (多 fact 能力 + 保留 routing) ──
  - name: "4_3fact_mix"
    data:
      num_train: 15000
      num_facts: 3
      entity_ratio: 0.5
      same_category: 0.3
      max_pre_filler: 1
      no_overwrite: true
      min_distance: 1
      max_distance: 2
      max_turns: 5
    training:
      episode_length: 5
      tbptt_steps: 5
      max_steps: 3000
  # ── Stage 5: ★ 3 entities 硬案例综合 (核心验收点) ──
  # entity_ratio=1.0 全 entity, same_cat=0.5 半数同类, num_facts=3
  # v5c: 数字已缩到 1-6 位，数据规模回落 20000 够用（原 50000 是 8 位数字时的补救）
  - name: "5_3entity_hard"
    data:
      num_train: 20000
      num_facts: 3
      entity_ratio: 1.0
      same_category: 0.5
      max_pre_filler: 1
      no_overwrite: true
      min_distance: 1
      max_distance: 2
      max_turns: 6
    training:
      episode_length: 6
      tbptt_steps: 6
      max_steps: 10000
  # ================================================================
  # Phase B: 中 turn (7), recall + 更难
  # ================================================================

  # ── Stage 6: User Recall + Entity (用户主动问"你刚才说了啥") ──
  - name: "6_recall_with_entity"
    data:
      num_train: 10000
      recall_ratio: 1.0
      entity_ratio: 0.3
      same_category: 0.2
      no_overwrite: true
      max_turns: 7
    training:
      episode_length: 7
      tbptt_steps: 7
      max_steps: 2000
  # ── Stage 7: ★ AI Recall 专训 (模型自省: 从 state 还原自己说过的回复) ──
  # v5c: 前一版 all_mix 里 ai_recall_ratio=0.5 混合时训不透，错误集中在这。
  # 单独一 stage 纯训 ai_recall_ratio=1.0，先把这个 meta 能力独立打稳。
  - name: "7_ai_recall"
    data:
      num_train: 10000
      ai_recall_ratio: 1.0
      entity_ratio: 0.3
      same_category: 0.2
      no_overwrite: true
      max_turns: 7
    training:
      episode_length: 7
      tbptt_steps: 7
      max_steps: 2500
  # ── Stage 8: 3 entities same_cat=0.7 (更难同类) ──
  - name: "8_entity_harder"
    data:
      num_train: 15000
      num_facts: 3
      entity_ratio: 1.0
      same_category: 0.7
      no_overwrite: true
      min_distance: 1
      max_distance: 3
      max_turns: 7
    training:
      episode_length: 7
      tbptt_steps: 7
      max_steps: 3000
  # ── Stage 9: 三模式空间混合 ──
  - name: "9_space_mix"
    data:
      num_train: 10000
      num_facts: 3
      entity_ratio: 0.5
      recall_ratio: 0.3
      same_category: 0.4
      no_overwrite: true
      min_distance: 1
      max_distance: 3
      max_turns: 7
    training:
      episode_length: 7
      tbptt_steps: 7
      max_steps: 2500
  # ================================================================
  # Phase C: 长 turn (16), 全混合收官
  # ================================================================

  # ── Stage 10: 5 facts 长距离 + entity ──
  - name: "10_fact_scale"
    data:
      num_train: 10000
      num_facts: 5
      entity_ratio: 0.3
      same_category: 0.3
      max_pre_filler: 2
      no_overwrite: true
      min_distance: 1
      max_distance: 8
      max_turns: 16
    training:
      episode_length: 16
      tbptt_steps: 16
      max_steps: 2500
  # ── Stage 11: 覆写 + entity ──
  - name: "11_overwrite"
    data:
      num_train: 10000
      num_facts: 5
      entity_ratio: 0.3
      same_category: 0.2
      max_pre_filler: 2
      overwrite_ratio: 0.4
      min_distance: 1
      max_distance: 6
      max_turns: 16
    training:
      episode_length: 16
      tbptt_steps: 16
      max_steps: 2500
  # ── Stage 12: 全能力混合收官 (含 ai_recall) ──
  - name: "12_all_mix"
    data:
      num_train: 10000
      num_facts: 5
      entity_ratio: 0.3
      recall_ratio: 0.2
      ai_recall_ratio: 0.5
      overwrite_ratio: 0.2
      same_category: 0.3
      min_distance: 1
      max_distance: 8
      max_turns: 16
    training:
      episode_length: 16
      tbptt_steps: 16
      max_steps: 3000