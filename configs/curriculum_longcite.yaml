# LongCite 数据生成 (v9 P-cap):
#   解析 zai-org/LongCite-45k 的 parquet,把 long_context 切 chunks 多 turn,
#   末轮接 question + response(含 cite 标注)。
#
#   parquet 来源:HuggingFace refs/convert/parquet/default/partial-train/
#     单个 0000.parquet (~240 MB) 解压 ≈ 500 MB jsonl,~4065 行,符合 P-cap mini 量级
#
# 用法:
#   python scripts/generate_data.py --config configs/longcite.yaml \
#     --stage longcite_only \
#     --parquet-path data/longcite_parquet/default/partial-train/0000.parquet

training_defaults:
  learning_rate: 3.0e-4
  grad_clip: 1.0
  gradient_checkpointing: false
  log_every: 10
  eval_every: 500
  save_every: 500

stages:
  - name: "longcite_only"
    data:
      kind: "longcite"
      chunk_chars: 350           # ≈ 500 token/chunk(跟 novel 一致)
      turns_per_episode: 8       # 7 个 chunk + 1 个 QA = 8 turn
      min_long_context_chars: 1000
      episodes_per_sample: 17    # 滑动窗口生成多 episode/sample,提升 long_context 利用率
      num_train: -1              # 自适应 = rows × episodes_per_sample
      num_val: 200
      seed: 42
      out_dir: "data/longcite"
    training:
      max_turns_per_episode: 8
      turn_max_tokens: 512
      plugin_lr_multiplier: 1.0
      value_weight_cap: 1.0
      phase: "P-cap"
      max_steps: 1000
      warmup_steps: 50
      use_joint_early_stop: false
    val_sets:
      - {name: "longcite_val", path: "data/longcite/val.jsonl"}
