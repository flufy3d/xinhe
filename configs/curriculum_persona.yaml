# ============================================================
# Persona 统一训练 — v7.1 课程（被 persona_unified*.yaml 引用）
#
# 5 stage bootstrap：
#   0a basic_rw       — persona 槽 2 轮 tell+recall（基础 Delta Rule 读写）
#   0b verbatim_rw    — 随机 alnum phrase 2-3 轮 recall（W 硬验证 gate）
#   0c context_review — reveal + chat + quote-back recall（上下文连续）
#   0d irrelevant_forget — reveal + distractor + recall（无关信息遗忘）
#   1  persona_unified  — 10-16 轮完整分布 + 所有 continuity/retention pattern
#
# 失败诊断：
#   0a 失败 → Delta Rule 基础读写（k_proj/v_proj/read_scale 有问题）
#   0b 失败 → W 路径没真学通（backbone 靠语义猜；v7 架构根本问题）
#   0c 失败 → time_shift 没学会内容 gating
#   0d 失败 → retention 学不出（distractor 抢了 W）
# ============================================================

training_defaults:
  learning_rate: 3.0e-4
  grad_clip: 1.0
  gradient_checkpointing: true
  log_every: 50
  eval_every: 1000
  save_every: 1000
  segment_length: 256

stages:
  # ── Stage 0a: persona 槽 2 轮 tell+recall ──
  - name: "0a_basic_rw"
    data:
      turn_kinds: {reveal_single: 0.5, recall: 0.5}
      patterns: {}
      min_turns: 2
      max_turns: 2
      num_train: 10000
      num_val: 200
      seed: 42
    training:
      episode_length: 2
      tbptt_steps: 2
      freeze_lora: true
      plugin_lr_multiplier: 1.0
      max_steps: 1500
      warmup_steps: 100
      use_joint_early_stop: false
      early_stop_value: 0.98

  # ── Stage 0b: Verbatim phrase 复述（W 硬验证 gate）──
  # 2-turn 纯净版：setup(告知) + recall(询问)，无 distractor → 每 turn 都算梯度
  # setup asst 是不含 phrase 的普通 ack，避免 copy-user 捷径
  # recall asst 用多样模板（含 {phrase}），value 只 match phrase 字符 span
  - name: "0b_verbatim_rw"
    data:
      turn_kinds: {}
      patterns:
        verbatim_recall: 1.0
      min_turns: 2
      max_turns: 2
      num_train: 10000
      num_val: 200
      cache_dir: "data/cache"
      seed: 43
    training:
      episode_length: 2
      tbptt_steps: 2
      freeze_lora: false
      plugin_lr_multiplier: 1.0
      max_steps: 1500
      warmup_steps: 100
      use_joint_early_stop: true
      early_stop_verbatim: 0.85

  # ── Stage 0c: 上下文连续（quote-back + context followup）──
  # episode_length=6 匹配 entity_tracking 最大 turn 数（setup + dtau∈[1,4] + recall）
  # reference_back/context_followup 只用 3-4 turn，小于 6 不截断
  - name: "0c_context_review"
    data:
      turn_kinds: {reveal_single: 0.25, general_chat: 0.15}
      patterns:
        reference_back: 0.30
        context_followup: 0.15
        entity_tracking: 0.15
      min_turns: 3
      max_turns: 6
      num_train: 15000
      num_val: 300
      cache_dir: "data/cache"
      seed: 44
    training:
      episode_length: 6
      tbptt_steps: 6
      freeze_lora: false
      plugin_lr_multiplier: 1.0
      max_steps: 2000
      warmup_steps: 200
      use_joint_early_stop: true
      early_stop_value: 0.85
      early_stop_reference_back: 0.80
      early_stop_entity_tracking: 0.75

  # ── Stage 0d: 无关信息遗忘 ──
  # episode_length=8 支持 stress_retention (n_reveal=2,chat∈[2,5]: ~6-13 turn)
  # 以及 fact_vs_transient (5 turn)。stress_retention n_reveal>2 超限会被截断（末轮 cross_recall 丢失），
  # 但主要 slot retention 回忆仍训练
  - name: "0d_irrelevant_forget"
    data:
      turn_kinds: {reveal_single: 0.2, general_chat: 0.3}
      patterns:
        stress_retention: 0.30
        fact_vs_transient: 0.20
      min_turns: 4
      max_turns: 8
      num_train: 15000
      num_val: 300
      cache_dir: "data/cache"
      seed: 45
    training:
      episode_length: 8
      tbptt_steps: 8
      freeze_lora: false
      plugin_lr_multiplier: 1.0
      max_steps: 2000
      warmup_steps: 200
      use_joint_early_stop: true
      early_stop_value: 0.85
      early_stop_irrelevant_forget: 0.80

  # ── Stage 1: Persona 统一训练 ──
  - name: "1_persona_unified"
    data:
      turn_kinds:
        general_chat: 0.20
        world_qa: 0.08
        reveal_single: 0.08
        reveal_multi: 0.04
        recall: 0.08
        refusal: 0.06
        overwrite: 0.03
        third_party: 0.02
        compositional: 0.02
      patterns:
        reference_back: 0.10
        context_followup: 0.08
        topic_continuation: 0.05
        entity_tracking: 0.04
        stress_retention: 0.04
        multi_slot_retention: 0.04
        rapid_overwrite: 0.02
        verbatim_recall: 0.02
      min_turns: 10
      max_turns: 16
      num_train: 50000
      num_val: 500
      cache_dir: "data/cache"
      seed: 46
    training:
      freeze_lora: false
      plugin_lr_multiplier: 0.3
      episode_length: 16
      tbptt_steps: 16   # v8 per_segment_checkpoint=True 后 BPTT 深度不再受显存限制
      max_steps: 8000
      warmup_steps: 200
      use_joint_early_stop: true
      early_stop_value: 0.95
      early_stop_world_qa: 0.82
      early_stop_refusal: 0.92
      early_stop_compositional: 0.92
      early_stop_rapid_overwrite: 0.85
      early_stop_reference_back: 0.85
      early_stop_context_followup: 0.78
      early_stop_entity_tracking: 0.75
      early_stop_irrelevant_forget: 0.85
      early_stop_verbatim: 0.70
