# ============================================================
# Xinhe (心核) 共用默认配置
# backbone 相关配置由各 backbone yaml 覆盖
# ============================================================

# --- StatePlugin ---
state:
  n_state: 32
  state_scale_init: -5.0
  gate_bias_init: 0.0

# --- Sleep (对话 buffer replay + 权重更新，里程碑 9 实现) ---
sleep:
  sleep_every: 4

# --- LoRA ---
lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  target_modules: ["q_proj", "v_proj"]

# --- 训练 ---
training:
  segment_length: 256
  episode_length: 16
  tbptt_steps: 4
  batch_size: 4
  learning_rate: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_steps: 100
  max_steps: 10000
  eval_every: 500
  save_every: 1000
  log_every: 10
  device: "cuda"
  dtype: "bfloat16"

# --- 数据 ---
data:
  train_path: "./data/train.jsonl"
  val_path: "./data/val.jsonl"

# --- 日志 ---
logging:
  use_wandb: false
  project: "xinhe"
  run_name: null
