# ============================================================
# Xinhe (心核) 共用默认配置
# 默认使用 Qwen3.5-0.8B，切换 backbone 用 --config 指定
# ============================================================

# --- 默认 backbone (可被 backbone yaml 覆盖) ---
backbone:
  type: "qwen"
  model_path: "./models/qwen3.5-0.8b"
  weights_path: ""
  hidden_size: 1024
  freeze: true

# --- StateInterface ---
state:
  n_state: 32
  state_dim: 1024
  state_scale_init: -3.0

# --- Sleep (对话 buffer replay + 权重更新，里程碑 9 实现) ---
sleep:
  sleep_every: 4

# --- LoRA ---
lora:
  rank: 4
  alpha: 8
  dropout: 0.0
  target_modules: ["q_proj", "v_proj"]

# --- 训练 ---
training:
  segment_length: 256
  episode_length: 8
  tbptt_steps: 8
  batch_size: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  grad_accum_steps: 1
  gradient_checkpointing: true
  warmup_steps: 100
  max_steps: 10000
  eval_every: 500
  save_every: 1000
  log_every: 50
  device: "cuda"
  dtype: "bfloat16"

# --- 数据 ---
data:
  train_path: "./data/train.jsonl"
  val_path: "./data/val.jsonl"

# --- 日志 ---
logging:
  use_wandb: false
  project: "xinhe"
  run_name: null
