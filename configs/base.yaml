# Xinhe 默认配置;切换 backbone 用 --config

backbone:
  type: "qwen"
  model_path: "./models/qwen3.5-0.8b"
  weights_path: ""
  hidden_size: 1024
  freeze: true

# v9 NeuralMemoryPair:
#   - Hippocampus:浅 MLP + TTT inner SGD(episode 内 fast weights 演化)
#   - Neocortex:深 MLP + 标准 backprop(慢知识基底,outer Adam 经 backbone 慢更新,
#                无 episode-scoped state,无 vmap+grad,扩深不爆显存)
state:
  n_heads: 16
  head_dim: 64                    # d_total = 16*64 = 1024 = hidden_size
  hippo_mlp_depth: 2
  hippo_mlp_expansion: 2.0
  neo_mlp_depth: 4
  neo_mlp_expansion: 4.0
  hippo_retention: 0.99           # Hippo 每 chunk 保留 99% 自然遗忘
  hippo_base_lr: 1.0e-2           # Hippo 内层 test-time SGD lr 上限
  mem_chunk_size: 64              # 仅作用于 Hippo TTT 路径
  alpha_logit_init: -5.0          # sigmoid(-5)≈0.007 保守起步
  alpha_min_clamp: 0.02
  gate_entropy_lambda: 0.01
  phase: "P-cap"                  # P-cap | Operational

# v9.5 LoRA(frozen backbone 适配 MAC OOD 输入的根因修复,与 NM/MAC 协同)
# qkvo,rank=16/alpha=32,零初始化保证启动期 frozen backbone 行为不变。
# stage 可在 stage_overrides 内 override。
lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]



# turn_max_tokens / max_turns_per_episode / tbptt_turns 必须 per-stage 显式给
training:
  batch_size: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  grad_accum_steps: 1
  gradient_checkpointing: false
  warmup_steps: 100
  max_steps: 10000
  eval_every: 1000
  save_every: 1000
  log_every: 50
  device: "cuda"
  dtype: "bfloat16"

data:
  train_path: "./data/train.jsonl"
  val_path: "./data/val.jsonl"

logging:
  use_wandb: false
  project: "xinhe"
  run_name: null
