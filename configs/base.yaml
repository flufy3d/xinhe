# ============================================================
# Xinhe (心核) 共用默认配置
# 默认使用 Qwen3.5-0.8B，切换 backbone 用 --config 指定
# ============================================================

# --- 默认 backbone (可被 backbone yaml 覆盖) ---
backbone:
  type: "qwen"
  model_path: "./models/qwen3.5-0.8b"
  weights_path: ""
  hidden_size: 1024
  freeze: true

# --- FactInterface (v6: Delta Rule 联想记忆 W_fact: (B,H,d_v,d_k)) ---
# read_scale_init=-3 (初始 scale≈0.047): 平衡读强度
# beta_bias_init=-2 (初始 β=0.12): 写入温和，让 W 稳定建立，避免激进累积
# head_dim=128 (第二轮): 同类 key 正交化瓶颈 → 扩 key/value 维度，单样本 W 从 64K→256K floats
state:
  n_heads: 16
  head_dim: 128
  read_scale_init: -3.0
  beta_bias_init: -2.0

# --- LoRA ---
lora:
  rank: 4
  alpha: 8
  dropout: 0.0
  target_modules: ["q_proj", "v_proj"]

# --- 训练 ---
training:
  segment_length: 256
  episode_length: 8
  tbptt_steps: 8
  batch_size: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  grad_accum_steps: 1
  gradient_checkpointing: false
  warmup_steps: 100
  max_steps: 10000
  eval_every: 1000       # v5c: val 每 1000 步（附带触发 VALUE 早停检查）
  save_every: 1000
  log_every: 50
  device: "cuda"
  dtype: "bfloat16"

# --- 数据 ---
data:
  train_path: "./data/train.jsonl"
  val_path: "./data/val.jsonl"

# --- 日志 ---
logging:
  use_wandb: false
  project: "xinhe"
  run_name: null
