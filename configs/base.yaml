# Xinhe 默认配置；切换 backbone 用 --config

backbone:
  type: "qwen"
  model_path: "./models/qwen3.5-0.8b"
  weights_path: ""
  hidden_size: 1024
  freeze: true

# Hippocampus: Delta Rule + per-head γ, W=(B,H,d_v,d_k)
state:
  n_heads: 16
  head_dim: 128
  read_scale_init: -3.0
  beta_bias_init: -2.0
  gamma_head_init_low: 0.8
  gamma_head_init_high: 0.999

lora:
  rank: 4
  alpha: 8
  dropout: 0.0
  target_modules: ["q_proj", "v_proj", "o_proj"]

# turn_max_tokens / max_turns_per_episode / tbptt_turns 必须 per-stage 显式给
training:
  batch_size: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  grad_accum_steps: 1
  gradient_checkpointing: false
  warmup_steps: 100
  max_steps: 10000
  eval_every: 1000
  save_every: 1000
  log_every: 50
  device: "cuda"
  dtype: "bfloat16"

data:
  train_path: "./data/train.jsonl"
  val_path: "./data/val.jsonl"

logging:
  use_wandb: false
  project: "xinhe"
  run_name: null
