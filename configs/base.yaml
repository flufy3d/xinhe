# Xinhe 默认配置;切换 backbone 用 --config

backbone:
  type: "qwen"
  model_path: "./models/qwen3.5-0.8b"
  weights_path: ""
  hidden_size: 1024
  freeze: true

# Hippocampus: 纯 Delta Rule, W=(B,H,d_v,d_k)
state:
  n_heads: 16
  head_dim: 128
  read_scale_init: -3.0
  beta_bias_init: -2.0
  delta_backend: "auto"   # 训练强制 torch;推理 auto→FLA on Linux+CUDA

# 全仓库 LoRA 唯一定义点。子 config 只重写 rank/alpha,target_modules 不再 per-config 覆盖。
lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

# 注意力层 ["q_proj", "k_proj", "v_proj", "o_proj"]
# 线性注意力层 ["in_proj_qkv", "in_proj_a", "in_proj_b", "in_proj_z", "out_proj"]
# MLP层 ["gate_proj", "up_proj", "down_proj"]



# turn_max_tokens / max_turns_per_episode / tbptt_turns 必须 per-stage 显式给
training:
  batch_size: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  grad_accum_steps: 1
  gradient_checkpointing: false
  warmup_steps: 100
  max_steps: 10000
  eval_every: 1000
  save_every: 1000
  log_every: 50
  device: "cuda"
  dtype: "bfloat16"

data:
  train_path: "./data/train.jsonl"
  val_path: "./data/val.jsonl"

logging:
  use_wandb: false
  project: "xinhe"
  run_name: null
