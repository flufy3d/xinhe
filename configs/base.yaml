# Xinhe 默认配置;切换 backbone 用 --config

backbone:
  type: "qwen"
  model_path: "./models/qwen3.5-0.8b"
  weights_path: ""
  hidden_size: 1024
  freeze: true

# v9 NeuralMemoryPair: Hippocampus(浅 MLP, awake plastic) + Neocortex(深 MLP, sleep only)
state:
  n_heads: 16
  head_dim: 64                    # d_total = 16*64 = 1024 = hidden_size
  hippo_mlp_depth: 2
  hippo_mlp_expansion: 2.0
  neo_mlp_depth: 4
  neo_mlp_expansion: 4.0
  hippo_retention: 0.99           # 每 chunk 保留 99% 自然遗忘
  neo_retention: 1.0              # 不衰减(靠 anchor 正则)
  hippo_base_lr: 1.0e-2
  neo_base_lr: 1.0e-4             # P-cap 默认小 lr,sleep 切到 5e-4
  mem_chunk_size: 64
  alpha_logit_init: -5.0          # sigmoid(-5)≈0.007 保守起步
  alpha_min_clamp: 0.02
  gate_entropy_lambda: 0.01
  phase: "P-cap"                  # P-cap | Operational



# turn_max_tokens / max_turns_per_episode / tbptt_turns 必须 per-stage 显式给
training:
  batch_size: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  grad_accum_steps: 1
  gradient_checkpointing: false
  warmup_steps: 100
  max_steps: 10000
  eval_every: 1000
  save_every: 1000
  log_every: 50
  device: "cuda"
  dtype: "bfloat16"

data:
  train_path: "./data/train.jsonl"
  val_path: "./data/val.jsonl"

logging:
  use_wandb: false
  project: "xinhe"
  run_name: null
