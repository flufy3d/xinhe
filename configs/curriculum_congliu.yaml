# Congliu R1 110k 蒸馏数据生成 (v9.5):
#   读 jsonl(input + content + reasoning_content + ...),
#   每条 → 单 turn 长 QA(user=input, assistant=content,含 think 段)。
#   质量过滤:min_asst_chars=200(短答弃),max_asst_chars=8000(超长弃)。
#
# 用法:
#   python scripts/generate_data.py --config configs/congliu.yaml \
#     --stage congliu_only \
#     --congliu-path data/congliu_raw/distill_r1_110k.jsonl

training_defaults:
  learning_rate: 3.0e-4
  grad_clip: 1.0
  gradient_checkpointing: false
  log_every: 10
  eval_every: 500
  save_every: 500

stages:
  - name: "congliu_only"
    data:
      kind: "congliu"
      max_user_chars: 2000        # 太长的 prompt 弃(R1 通常 < 500)
      max_asst_chars: 8000        # R1 完整输出(含 think)中位 1318 tokens ≈ 2K 字
      min_asst_chars: 200         # 短答弃,质量过滤
      num_train: 100000           # 110k 几乎全量(seed 不同,train/val 自然分子集)
      num_val: 500
      seed: 42
      out_dir: "data/congliu"
    training:
      max_turns_per_episode: 2    # Congliu 单 turn QA
      turn_max_tokens: 768
      plugin_lr_multiplier: 1.0
      value_weight_cap: 1.0
      phase: "P-cap"
      max_steps: 1000
      warmup_steps: 50
      use_joint_early_stop: false
    val_sets:
      - {name: "congliu_val", path: "data/congliu/val.jsonl"}
