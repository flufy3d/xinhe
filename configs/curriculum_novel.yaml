# Novel-recall 课程:仅一个 stage,基于真实小说的 regex 伪交互
# 与主 curriculum.yaml 解耦,快速验证 W 长程上下文携带能力。
#
# 数据由 NovelGenerator 自动生成 (无 LLM):
#   user      = 段落引号内纯台词 (信息孤立)
#   assistant = 上 dialog 段后 → 当前 dialog 段(含原文) → 下 dialog 段前
# 起点随机化 + episode 长度随机 → 堵 LoRA 死记。

training_defaults:
  learning_rate: 3.0e-4
  grad_clip: 1.0
  gradient_checkpointing: true
  log_every: 10
  eval_every: 500
  save_every: 500

stages:
  - name: "novel_only"
    data:
      kind: "novel"
      # 小说路径只能从 CLI 传入: --novel-path /path/to/novel.txt
      # 配置文件不持久化路径,避免 yaml 里嵌私人本地路径污染 git 历史。
      turns_range: [8, 12]
      coverage: 3                # 每段 dialog 平均当 3 次起点
      leading_paras: 2           # 第一 turn 包含起点前 2 段叙事
      turn_max_chars: 200        # 单 turn assistant 字数上限(配 turn_max_tokens=256)
      # 章节段(默认 regex 已覆盖 第X章/回/节)从 paragraphs 删除,episode 不跨章。
      # 默认 pattern 在 novel_loader.DEFAULT_CHAPTER_PATTERN,换书需要时再传 chapter_pattern。
      num_train: -1              # 自适应 = len(dialog_idx) × coverage
      num_val: 500
      seed: 42
      out_dir: "data/novel"
    training:
      max_turns_per_episode: 12
      turn_max_tokens: 256
      freeze_lora: false
      plugin_lr_multiplier: 1.0
      max_steps: 7000          # ≈ 1 epoch (92K samples / batch=14 ≈ 6580 step)
      warmup_steps: 300
      use_joint_early_stop: false
    val_sets:
      - {name: "novel_val", path: "data/novel/val.jsonl"}
