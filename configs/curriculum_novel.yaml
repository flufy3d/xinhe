# Novel raw chunking 数据生成 (v9 P-cap):
#   每 episode = 8 个连续章内 chunk(每 chunk ~350 字 ≈ 500 token)
#   user="" 占位,assistant=raw chunk,labels=全 token next-token
#   小说路径只能从 CLI 传入: --novel-path /path/to/novel.txt
#
# 用途:作 P-cap 阶段长上下文压力源,跟 dialog/skeleton 混在 curriculum_pcap.yaml。
# 单独训练此 stage 也可用(回归 v9 fast-weights 长程吸收能力)。

training_defaults:
  learning_rate: 3.0e-4
  grad_clip: 1.0
  gradient_checkpointing: true
  log_every: 10
  eval_every: 500
  save_every: 500

stages:
  - name: "novel_only"
    data:
      kind: "novel"
      chunk_chars: 350           # ≈ 500 token/chunk(中文 ~1.5 token/char)
      turns_per_episode: 8       # 每 episode 8 个连续章内 chunk
      # 章节切分由 default pattern 自动识别(union 多种格式),不依赖具体书名
      num_train: -1              # 自适应 = 所有合法起点
      num_val: 500
      seed: 42
      out_dir: "data/novel"
    training:
      max_turns_per_episode: 8
      turn_max_tokens: 512
      plugin_lr_multiplier: 1.0
      value_weight_cap: 1.0
      phase: "P-cap"
      max_steps: 1000
      warmup_steps: 50
      use_joint_early_stop: false
    val_sets:
      - {name: "novel_val", path: "data/novel/val.jsonl"}
