# ============================================================
# 基座迁移课程 (所有 backbone 共享)
#
# 将已训练好的 plugin core (灵魂) 适配到新的 backbone。
# 4 阶段渐进解冻: 投影层热身 → LoRA 适配 → 联合微调 → 全能力恢复
#
# 用法:
#   python scripts/train.py \
#     --config configs/migrate_0.8b_to_4b.yaml \
#     --migrate-from checkpoints/curriculum/13_all.pt
# ============================================================

think_lang: en

training_defaults:
  episode_length: 16
  tbptt_steps: 16
  learning_rate: 1.0e-4
  plugin_lr_multiplier: 2.0
  grad_accum_steps: 2
  max_steps: 3000
  early_stop_loss: 0.05
  early_stop_patience: 200

stages:
  # ── M0: 投影层热身 ──
  # 冻结 plugin core + LoRA, 只训 proj_up / proj_down
  # 最简数据: 名字, 2轮, 零距离
  - name: "M0_proj_warmup"
    data:
      num_train: 10000
      no_pre_filler: true
      no_overwrite: true
      min_distance: 0
      max_distance: 0
      max_turns: 2
      categories: ["name"]
    training:
      episode_length: 2
      tbptt_steps: 2
      learning_rate: 3.0e-4
      freeze_plugin_core: true
      freeze_lora: true
      max_steps: 2000

  # ── M1: LoRA 适配 ──
  # 冻结 plugin core, 训 proj + LoRA
  # 基础记忆: distance=1, 4轮
  - name: "M1_lora_adapt"
    data:
      num_train: 10000
      no_pre_filler: true
      no_overwrite: true
      min_distance: 1
      max_distance: 1
      max_turns: 4
    training:
      episode_length: 4
      tbptt_steps: 4
      learning_rate: 3.0e-4
      freeze_plugin_core: true
      max_steps: 3000

  # ── M2: 联合微调 ──
  # 全解冻, plugin core 低学习率 (0.1x)
  # 3类事实, 16轮多轮记忆
  - name: "M2_joint_basic"
    data:
      num_train: 10000
      num_facts: 3
      max_pre_filler: 2
      no_overwrite: true
      min_distance: 1
      max_distance: 5
      max_turns: 16
      think_ratio: 0.2
    training:
      plugin_core_lr_multiplier: 0.1
      max_steps: 5000

  # ── M3: 全能力恢复 ──
  # 全解冻, plugin core 低学习率
  # 覆写 + 实体 + 回忆全能力
  - name: "M3_full_recovery"
    data:
      num_train: 10000
      num_facts: 5
      entity_ratio: 0.2
      recall_ratio: 0.2
      ai_recall_ratio: 0.5
      overwrite_ratio: 0.2
      same_category: 0.3
      min_distance: 1
      max_distance: 10
      max_turns: 16
      think_ratio: 0.3
    training:
      plugin_core_lr_multiplier: 0.1
      max_steps: 5000
