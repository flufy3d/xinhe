# ============================================================
# 基座迁移课程 (所有 backbone 共享)
#
# 将已训练好的 plugin core (灵魂) 适配到新的 backbone。
# plugin core 已训好 → 信号固定 → proj + LoRA 可同时训练
#
# 用法:
#   python scripts/train.py \
#     --config configs/migrate_0.8b_to_4b.yaml \
#     --migrate-from checkpoints/curriculum/13_all.pt
# ============================================================

training_defaults:
  episode_length: 16
  tbptt_steps: 16
  learning_rate: 3.0e-4
  plugin_lr_multiplier: 2.0
  grad_accum_steps: 2
  max_steps: 5000
  early_stop_loss: 0.05
  early_stop_patience: 200

stages:
  # ── 迁移适配 ──
  # plugin core 冻结, 同时训 proj + LoRA
  # proj 学维度桥接, LoRA 学读写 state, 两者不冲突
  # 全能力数据: 迁移不需要从简到难 (core 已训好, 不存在"放弃 state"风险)
  - name: "M0_adapt"
    data:
      num_train: 10000
      num_facts: 5
      entity_ratio: 0.2
      recall_ratio: 0.2
      ai_recall_ratio: 0.5
      overwrite_ratio: 0.2
      same_category: 0.3
      min_distance: 1
      max_distance: 10
      max_turns: 16
    training:
      freeze_plugin_core: true
