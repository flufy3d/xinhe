# ============================================================
# Persona Unified — Qwen3.5-0.8B 版本 (v7.1 Hippocampus)
#
# 前置：
#   1. export DEEPSEEK_API_KEY=...
#   2. python scripts/build_chat_cache.py   → data/cache/*.jsonl
#   3. python scripts/build_val_sets.py     → data/val/*.jsonl
#
# 用法（端到端 5 stage，从零训，不兼容 v7 旧 ckpt）：
#   python scripts/train.py --config configs/persona_unified_0.8b.yaml
#
# Stage 0a → 0b → 0c → 0d → 1，预估 ~12k 步
# ============================================================
base: qwen3.5-0.8b.yaml
curriculum_file: curriculum_persona.yaml

data:
  val_worldqa_path: "data/val/val_worldqa.jsonl"
  val_refusal_path: "data/val/val_refusal.jsonl"
  val_compositional_path: "data/val/val_compositional.jsonl"
  val_rapid_overwrite_path: "data/val/val_rapid_overwrite.jsonl"
  val_verbatim_path: "data/val/val_verbatim.jsonl"
  val_reference_back_path: "data/val/val_reference_back.jsonl"
  val_context_followup_path: "data/val/val_context_followup.jsonl"
  val_topic_continuation_path: "data/val/val_topic_continuation.jsonl"
  val_entity_tracking_path: "data/val/val_entity_tracking.jsonl"
  val_irrelevant_forget_path: "data/val/val_irrelevant_forget.jsonl"
  val_multi_slot_retention_path: "data/val/val_multi_slot_retention.jsonl"

stage_overrides:
  default:
    batch_size: 2
    grad_accum_steps: 2
  0a_basic_rw:
    batch_size: 8
    grad_accum_steps: 1
  0b_verbatim_rw:
    batch_size: 8
    grad_accum_steps: 1
  0c_context_review:
    batch_size: 8
    grad_accum_steps: 1
  0d_irrelevant_forget:
    batch_size: 8
    grad_accum_steps: 1
  1_persona_unified:
    batch_size: 8
    grad_accum_steps: 1
