# v8 课程：Stage 0 骨架混合 → Stage 1 5-Beat → Stage 2 联合巩固

training_defaults:
  learning_rate: 3.0e-4
  grad_clip: 1.0
  gradient_checkpointing: true
  log_every: 10
  eval_every: 1000
  save_every: 1000

stages:
  - name: "0_atomic_skeletons"
    data:
      stage_kind: "stage0"
      skeleton_weights:
        S1: 1.0
        S2: 0.6
        S3: 0.8
        S4: 0.8
        S5: 1.0
        S6: 0.6
        S7: 1.0
        S8: 0.5
        S9: 0.6
        S10: 0.8
        S11: 0.8
      distance_bucket:
        near: 0.20
        mid: 0.35
        far: 0.30
        very_far: 0.15
      n_canonical_range: [1, 3]
      num_train: 100000
      num_val: 1000
      seed: 42
      out_dir: "data/v8/stage0"
    training:
      max_turns_per_episode: 12
      turn_max_tokens: 256
      freeze_lora: false
      plugin_lr_multiplier: 1.0
      max_steps: 6000
      warmup_steps: 200
      use_joint_early_stop: true
      early_stop:
        stage0_seen_entity_overall: 0.90
        stage0_seen_entity_S1: 0.95
        stage0_seen_entity_S5: 0.85
        stage0_seen_entity_S10: 0.85
        stage0_seen_entity_S11: 0.80
    val_sets:
      - {name: "stage0_seen_entity",   path: "data/v8/val/stage0/seen_entity.jsonl"}
      - {name: "stage0_unseen_entity", path: "data/v8/val/stage0/unseen_entity.jsonl"}

  - name: "1_5beat_natural"
    data:
      stage_kind: "stage1"
      mix:
        "1A": 1.00
      n_canonical_range: [1, 3]
      n_turns_range: [10, 14]
      beat3_min_turns: 1
      beat3_min_chars: 450
      beat3_chars_tolerance: 0.56
      num_train: 30000
      num_val: 500
      seed: 43
      workers: 4
      model: "deepseek-v4-flash"
      out_dir: "data/v8/stage1"
    training:
      freeze_lora: false
      plugin_lr_multiplier: 0.3
      max_turns_per_episode: 16
      turn_max_tokens: 256
      max_steps: 10000
      warmup_steps: 200
      use_joint_early_stop: true
      early_stop:
        stage1_seen_entity_overall: 0.88
        stage1_seen_entity_substream_1A: 0.90
        stage1_seen_entity_substream_1B: 0.78
        stage1_seen_entity_tier_hard: 0.92
        stage1_seen_entity_tier_soft: 0.85
    val_sets:
      - {name: "stage1_seen_entity",   path: "data/v8/val/stage1/seen_entity.jsonl"}
      - {name: "stage1_unseen_entity", path: "data/v8/val/stage1/unseen_entity.jsonl"}

  - name: "2_joint_consolidation"
    data:
      stage_kind: "stage2"
      sources:
        - {path: "data/v8/stage0/train.jsonl", ratio: 0.15, tag: "stage0"}
        - {path: "data/v8/stage1/train.jsonl", ratio: 0.85, tag: "stage1"}
      num_train: 20000
      num_val: 500
      seed: 44
      out_dir: "data/v8/stage2"
    training:
      freeze_lora: false
      plugin_lr_multiplier: 0.5
      max_turns_per_episode: 16
      turn_max_tokens: 256
      max_steps: 4000
      warmup_steps: 100
      use_joint_early_stop: true
      early_stop:
        stage0_seen_entity_overall: 0.85
        stage1_seen_entity_overall: 0.85
    val_sets:
      - {name: "stage0_seen_entity",   path: "data/v8/val/stage0/seen_entity.jsonl"}
      - {name: "stage0_unseen_entity", path: "data/v8/val/stage0/unseen_entity.jsonl"}
      - {name: "stage1_seen_entity",   path: "data/v8/val/stage1/seen_entity.jsonl"}
      - {name: "stage1_unseen_entity", path: "data/v8/val/stage1/unseen_entity.jsonl"}
