# ============================================================
# 心核课程学习 — Qwen3-0.6B / 24GB 显存
#
# batch 全面加大。
# 用法:
#   python scripts/train.py --config configs/curriculum_qwen_24gb.yaml
# ============================================================
base: qwen3-0.6b.yaml
curriculum_file: curriculum.yaml

stage_overrides:
  default:
    batch_size: 4
  1_base_memory:
    batch_size: 8
  2_random_tell:
    batch_size: 8
  3_distance:
    batch_size: 8
  14_think:
    data_gen_batch_size: 32
