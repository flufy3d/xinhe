# ============================================================
# Persona Unified — Qwen3.5-4B 版本
#
# 前置同 0.8b（data/cache 和 data/val 已就位）。
#
# 用法（从 backbone init 2 stage 端到端）：
#   python scripts/train.py --config configs/persona_unified_4b.yaml
#
# 预期：Stage 0 ~1500 步 plugin 学会 Delta Rule →
#       Stage 1 ~3000-4000 步 4 指标联合达标
#       总 ~5000-6000 步（比原单 stage 10000 步减半）
# ============================================================
base: qwen3.5-4b.yaml
curriculum_file: curriculum_persona.yaml

data:
  val_worldqa_path: "data/val/val_worldqa.jsonl"
  val_refusal_path: "data/val/val_refusal.jsonl"
  val_compositional_path: "data/val/val_compositional.jsonl"

stage_overrides:
  default:
    batch_size: 1        # 4b 显存紧
    grad_accum_steps: 4
  0_bootstrap:
    batch_size: 4        # 2 轮短 ep 可以放大
    grad_accum_steps: 1
