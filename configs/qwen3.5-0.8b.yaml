# ============================================================
# Xinhe — Qwen3.5-0.8B backbone (0.8B, 混合 attention)
#
# 6 层标准 attention + 18 层线性 attention
# LoRA 覆盖两种 attention 层的投影模块
# ============================================================
base: base.yaml

backbone:
  type: "qwen"
  model_path: "./models/qwen3.5-0.8b"
  weights_path: ""
  hidden_size: 1024
  freeze: true

# state: 继承 base.yaml (n_heads=16, head_dim=64)

lora:
  rank: 16                    # v6 双流：backbone 要适配 fact+turn 两股记忆注入 + 4 类新 curriculum pattern
  alpha: 32
  target_modules: ["q_proj", "v_proj", "in_proj_qkv", "out_proj"]
