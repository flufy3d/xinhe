# ============================================================
# 基础记忆课程 — Qwen3.5-9B / A800 80GB
#
# 9B bf16 ≈ 18GB, 80GB 余 ~60GB 给激活
# hidden_size=4096, 32层, LoRA rank=8
# ============================================================
base: qwen3.5-9b.yaml
curriculum_file: curriculum.yaml

stage_overrides:
  default:
    batch_size: 2          # ep=16, tbptt=16
  0_state_init:
    batch_size: 8          # ep=2, tbptt=2
  1_base_memory:
    batch_size: 6          # ep=4, tbptt=4
  2_random_tell:
    batch_size: 4          # ep=5, tbptt=5
  3_distance:
    batch_size: 3          # ep=7, tbptt=7
