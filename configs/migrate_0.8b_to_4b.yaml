# 基座迁移: Qwen3.5-0.8B → Qwen3.5-4B / 4090 24GB
#
# 用法:
#   python scripts/train.py \
#     --config configs/migrate_0.8b_to_4b.yaml \
#     --migrate-from checkpoints/curriculum/13_all.pt

base: qwen3.5-4b.yaml
curriculum_file: curriculum_migrate.yaml

stage_overrides:
  default:
    batch_size: 1          # M2/M3: ep=16, tbptt=16
  M0_proj_warmup:
    batch_size: 3          # ep=2, tbptt=2
  M1_lora_adapt:
    batch_size: 2          # ep=4, tbptt=4
