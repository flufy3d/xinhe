# ============================================================
# 基础记忆课程 — Qwen3.5-4B / 4090 24GB
#
# 4B bf16 ≈ 8GB, 24GB 余 ~15GB 给激活
# hidden_size=2560, 32层, LoRA rank=16
# ============================================================
base: qwen3.5-4b.yaml
curriculum_file: curriculum.yaml

stage_overrides:
  default:
    batch_size: 1          # ep=16, tbptt=16
  0_state_init:
    batch_size: 3          # ep=2, tbptt=2
  1_base_memory:
    batch_size: 3          # ep=4, tbptt=4
  2_random_tell:
    batch_size: 2          # ep=5, tbptt=5
  3_distance:
    batch_size: 2          # ep=7, tbptt=7
