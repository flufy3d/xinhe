# ============================================================
# 思考泛化课程 — Qwen3.5-0.8B / 4090 24GB
#
# segment_length=512, ep=8, tbptt=8, plugin 全冻结
# 只训 LoRA → 激活显存比基础记忆小 (无 plugin 梯度)
# ============================================================
base: qwen3.5-0.8b.yaml
curriculum_file: curriculum_think.yaml

stage_overrides:
  default:
    batch_size: 2                # seg_len=512 × ep=8 下训练 batch 顶 2，批次更大 cross_entropy OOM
    data_gen_batch_size: 128     # 数据生成只靠 backbone inference，batch 128 安全
