# Skeleton 数据生成 (v9.5 paragraph DistractGroup):
#   S1/S2/S5/S7/S9/S10/S11 用 _DG_PARA(paragraph 模式,从 congliu_distract bank 拼接长段)
#   S3/S4/S8 无 distract 不变
#
# 用法:
#   python scripts/generate_data.py --config configs/skeleton.yaml --stage skeleton_only

training_defaults:
  learning_rate: 3.0e-4
  grad_clip: 1.0
  gradient_checkpointing: false
  log_every: 10
  eval_every: 500
  save_every: 500

stages:
  - name: "skeleton_only"
    data:
      kind: "skeleton"
      num_train: 200000           # 合成成本低,4× 数据让 mix 比例灵活;不嫌多以后可少抽
      num_val: 500
      seed: 42
      out_dir: "data/skeleton"
    training:
      max_turns_per_episode: 24    # paragraph distract 让 episode 能到 16-24 turns
      turn_max_tokens: 768
      plugin_lr_multiplier: 1.0
      value_weight_cap: 1.0
      phase: "P-cap"
      max_steps: 1000
      warmup_steps: 50
      use_joint_early_stop: false
    val_sets:
      - {name: "skeleton_val", path: "data/skeleton/val.jsonl"}
