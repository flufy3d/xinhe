# ============================================================
# 思考泛化课程 (所有 backbone / 硬件共享)
#
# 基础记忆课程完成后，教模型从 state 中推理 + 恢复长回复。
# 基础记忆见 curriculum.yaml，迁移课程见 curriculum_migrate.yaml。
#
# 用法 (在目标 backbone 上跑):
#   python scripts/train.py --config configs/think_qwen3.5-4b.yaml
# ============================================================

think_lang: en

training_defaults:
  episode_length: 16
  tbptt_steps: 16
  learning_rate: 1.0e-4
  # 冻结整个 StateInterface: think 模板大变样，防止破坏 state 读写能力
  freeze_plugin_core: true       # 冻结核心 (state_emb/gate_proj)
  plugin_lr_multiplier: 0.0     # 冻结投影层 (read/write projections)
  # 只训 LoRA: 学会从 state 推理 + 生成 think 格式
  grad_accum_steps: 2
  max_steps: 5000
  early_stop_loss: 0.08
  early_stop_patience: 200

stages:
  # ── Think 课程 ──
  # 100% think 数据, plugin 全冻结所以不需要 memory 混合
  # LoRA 只学一件事: state → think 格式推理输出
  - name: "T0_think"
    data:
      type: think
      num_think: 10000
      num_memory: 0
      num_val_think: 100
      num_val_memory: 0
      memory_think_ratio: 0.0
      ratio_fact: 0.55
      ratio_continuation: 0.20
      ratio_heartbeat: 0.15
      ratio_logic: 0.10
      max_new_tokens: 512
    training:
      segment_length: 512
      episode_length: 8
      tbptt_steps: 8
