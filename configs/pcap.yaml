# v9 P-cap mini run 入口 — fast-weights 长上下文能力底座
#
# 数据:经 scripts/upload_to_hf.py / download_from_hf.py 在 flufy3d/xinhe-dataset 同步,
#      4 个 source(novel / longcite / dialog / skeleton)在内存按比例 mix_dynamic 抽样,不落物理 mix 文件。
#
# 跑训练:
#   python scripts/train.py --config configs/pcap.yaml
#
# 远端(VM):
#   python scripts/remote.py deploy   # 同步代码 + HF 拉数据
#   python scripts/remote.py start python scripts/train.py --config configs/pcap.yaml
#   python scripts/remote.py logs -f
#
# 显存调优(RTX 4090 24GB,0.8B + v9 NeuralMemoryPair):
#   - bs=1, accum=4, turns=4, tok=512 → ~13.8 GB(56% 利用率,余量太多)
#   - bs=2, accum=2, turns=4, tok=512 → 估 ~22 GB(effective batch 不变,激活密度翻倍)
#   - 还有余量再考虑 max_turns 4→6/8 拉长 state 跨 turn 序列
base: qwen3.5-0.8b.yaml

curriculum_file: curriculum_pcap.yaml

state:
  # v9.5 paper-faithful:
  #   - persistent memory 改 per-layer K/V(每个 full_attention 层独立,在 attention 内拼接)
  #   - past_snapshots 删除(跨 turn carry 走 NM weights 演化,paper way)
  #   - mac_inject_logit init +10 ≈ sigmoid 0.99996 ≈ paper 直接 += mem_out(软取消)
  n_persistent_per_layer: 4        # 每个 full_attention 层独立 K/V tokens 数
  mac_inject_logit_init: 10.0       # paper 软取消;模型自行决定末态(≈10 印证 paper,< 7 说明仍需 gating)

training:
  grad_accum_steps: 4
  dtype: bfloat16
  compile_backbone_layers: true   # 局部 compile 每个 Qwen layer body(NM 在 compile 外)

stage_overrides:
  pcap_mini:
    # v9.5 训练计划:LoRA(qkvo) + per-layer K/V + Congliu data + paper 对齐 weight_decay 0.1
    # 步数 1000 → 3000(补回 v8 量级训练量)
    # 长 episode max_turns 8 → 16 + turn_max_tokens 512 → 768 让 MAC 通路真有用武之地
    learning_rate: 7.0e-5
    warmup_steps: 200             # LoRA + per-layer K/V + Congliu 同时引入新分布,缓和点
    weight_decay: 0.1             # 0.01 → 0.1 paper 对齐;LoRA 翻倍可训参数后防过拟合
    batch_size: 2                 # cut_cross_entropy 落地后 bs=1 仅 15.6GB(原 20GB),试 bs=2
    grad_accum_steps: 4           # bs×accum=8 effective batch 与之前等价
    turn_max_tokens: 768          # 512 → 768 给 Congliu paragraph 留余量
    max_turns_per_episode: 16     # 8 → 16 长 episode
    tbptt_turns: 3                # bs=2 显存吃紧 4→3 留 ~6GB 余量,backward 频次 +33%
    max_steps: 3000               # 1000 → 3000
