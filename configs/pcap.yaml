# v9 P-cap mini run 入口 — fast-weights 长上下文能力底座
#
# 数据:经 scripts/upload_to_hf.py / download_from_hf.py 在 flufy3d/xinhe-dataset 同步,
#      4 个 source(novel / longcite / dialog / skeleton)在内存按比例 mix_dynamic 抽样,不落物理 mix 文件。
#
# 跑训练:
#   python scripts/train.py --config configs/pcap.yaml
#
# 远端(VM):
#   python scripts/remote.py deploy   # 同步代码 + HF 拉数据
#   python scripts/remote.py start python scripts/train.py --config configs/pcap.yaml
#   python scripts/remote.py logs -f
#
# 显存调优(RTX 4090 24GB,0.8B + v9 NeuralMemoryPair):
#   - batch_size=1 + grad_accum_steps=4 = effective batch 4,稳跑约 8-12 GB
#   - 若有显存余量可在 stage_overrides 里 batch_size=2(检验后再调)
base: qwen3.5-0.8b.yaml

curriculum_file: curriculum_pcap.yaml

training:
  grad_accum_steps: 4
  dtype: bfloat16
  compile_backbone_layers: true   # 局部 compile 每个 Qwen layer body(NM 在 compile 外)

stage_overrides:
  pcap_mini:
    batch_size: 1
    grad_accum_steps: 4
    # 24GB / 0.8B 第一次跑保守起步,跑通后再视余量上调:
    #   turn=512 × max_turns=4 → 2048 tokens/episode,32 个 Hippo chunks
    #   Neo 走标准 backprop 已不再是 OOM 主因,可以保留 base 默认(depth=4 exp=4.0)
    turn_max_tokens: 512
    max_turns_per_episode: 4
