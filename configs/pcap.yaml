# v9 P-cap mini run 入口 — fast-weights 长上下文能力底座
#
# 数据:经 scripts/upload_to_hf.py / download_from_hf.py 在 flufy3d/xinhe-dataset 同步,
#      4 个 source(novel / longcite / dialog / skeleton)在内存按比例 mix_dynamic 抽样,不落物理 mix 文件。
#
# 跑训练:
#   python scripts/train.py --config configs/pcap.yaml
#
# 远端(VM):
#   python scripts/remote.py deploy   # 同步代码 + HF 拉数据
#   python scripts/remote.py start python scripts/train.py --config configs/pcap.yaml
#   python scripts/remote.py logs -f
#
# 显存调优(RTX 4090 24GB,0.8B + v9 NeuralMemoryPair):
#   - bs=1, accum=4, turns=4, tok=512 → ~13.8 GB(56% 利用率,余量太多)
#   - bs=2, accum=2, turns=4, tok=512 → 估 ~22 GB(effective batch 不变,激活密度翻倍)
#   - 还有余量再考虑 max_turns 4→6/8 拉长 state 跨 turn 序列
base: qwen3.5-0.8b.yaml

curriculum_file: curriculum_pcap.yaml

state:
  # Ablation: 关掉 cross-turn snapshots(只保 persistent_mem 全局 + fresh_mem 本 turn)
  # 测试 cross-turn hidden carry 是不是真有贡献
  max_mem_snapshots: 0

training:
  grad_accum_steps: 4
  dtype: bfloat16
  compile_backbone_layers: true   # 局部 compile 每个 Qwen layer body(NM 在 compile 外)

stage_overrides:
  pcap_mini:
    # Pure MAC 历程:
    #   lr=3e-4 + inject=1.0          → step 5-90 loss 5→14 砸崩
    #   lr=5e-5 + inject=1.0          → 不发散但学不动(50 步只降 0.08)
    #   lr=1.5e-4 + inject=sigmoid(-3) → step 5-50 改善 4.3→3.7,但 lr 一到峰就反弹
    #   lr=7e-5 + warmup=150          → 平缓过渡,看能否稳住
    learning_rate: 7.0e-5
    warmup_steps: 150
    # 维持 bs=1 + accum=4,扩 max_turns 让 Hippo 跨 turn state 累积更长,顺便提显存利用率。
    # max_turns=8 完整覆盖 longcite (7 ctx + 1 QA) / skeleton needle 序列
    # tbptt_turns=2 把 BPTT 窗口从默认 4 减半 → 峰值 activation 减半,
    # 否则 max_turns=8 + tbptt=4 直接 24/24.5 GB OOM(2026-05-07 实测)
    # tbptt=2 在 Titans 架构下不损失能力(Hippo 是 per-token inner SGD,
    # gate/alpha 是局部决策,长程梯度本就不需要)
    # 显存实测:bs=1 + tbptt=2 + max_turns=8 → 9.1 GB,有 15 GB 余量
    # 顺势 bs 拉到 2,effective batch = 8,梯度更稳
    batch_size: 2
    grad_accum_steps: 4
    turn_max_tokens: 512
    max_turns_per_episode: 8
    tbptt_turns: 2
