base: qwen3-0.6b.yaml
curriculum_file: curriculum.yaml

# 硬件相关覆盖 (只写与 curriculum.yaml 不同的部分)
stage_overrides:
  default:
    batch_size: 2
  1_base_memory:
    batch_size: 8
  2_random_tell:
    batch_size: 4
  3_distance:
    batch_size: 4
