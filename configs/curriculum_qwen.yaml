# ============================================================
# 心核课程学习配置 (Qwen3-0.6B)
#
# 分阶段训练，每阶段自动生成数据、训练、保存 checkpoint。
# 用法:
#   python scripts/train.py --config configs/curriculum_qwen.yaml
#   python scripts/train.py --config configs/curriculum_qwen.yaml --from-stage 3_distance
# ============================================================
base: qwen3-0.6b.yaml

curriculum:
  # 阶段 1: 基础记忆 — 学会 state 读写机制
  # 固定 tell 位置 (第一轮), distance=1, 305 种 filler
  - name: "1_base_memory"
    data:
      num_train: 5000
      no_pre_filler: true
      no_overwrite: true
      min_distance: 1
      max_distance: 1
      max_turns: 4
    training:
      episode_length: 4
      tbptt_steps: 4
      batch_size: 4
      learning_rate: 3.0e-4
      max_steps: 5000
      early_stop_loss: 0.01
      early_stop_patience: 200

  # 阶段 2: 随机 tell 位置 — 学会内容级写入判断
  # tell 前 0-1 轮闲聊, 16 种 filler (减少干扰)
  - name: "2_random_tell"
    data:
      num_train: 5000
      num_fillers: 16
      max_pre_filler: 1
      no_overwrite: true
      min_distance: 1
      max_distance: 1
      max_turns: 5
    training:
      episode_length: 5
      tbptt_steps: 5
      batch_size: 2
      grad_accum_steps: 2
      learning_rate: 1.0e-4
      max_steps: 5000
      early_stop_loss: 0.01
      early_stop_patience: 200

  # 阶段 3: 增大距离 — 学会跨距离保持记忆
  # distance 1-3, 16 种 filler
  - name: "3_distance"
    data:
      num_train: 5000
      num_fillers: 16
      max_pre_filler: 1
      no_overwrite: true
      min_distance: 1
      max_distance: 3
      max_turns: 7
    training:
      episode_length: 7
      tbptt_steps: 7
      batch_size: 2
      grad_accum_steps: 2
      learning_rate: 1.0e-4
      max_steps: 5000
      early_stop_loss: 0.01
      early_stop_patience: 200

  # 阶段 4: 完整多轮记忆 — M4 目标
  # 305 种 filler, 随机 tell, distance 1-10
  - name: "4_full_m4"
    data:
      num_train: 5000
      max_pre_filler: 2
      no_overwrite: true
      min_distance: 1
      max_distance: 10
      max_turns: 16
    training:
      episode_length: 16
      tbptt_steps: 16
      batch_size: 1
      grad_accum_steps: 4
      learning_rate: 1.0e-4
      max_steps: 10000
      early_stop_loss: 0.01
      early_stop_patience: 200

  # 阶段 5: 3 类事实 — 从 8 类中随机选 3 类（泛化到新类别）
  - name: "5_fact3"
    data:
      num_train: 5000
      num_facts: 3
      max_pre_filler: 2
      no_overwrite: true
      min_distance: 1
      max_distance: 5
      max_turns: 16
    training:
      episode_length: 16
      tbptt_steps: 16
      batch_size: 1
      grad_accum_steps: 4
      learning_rate: 1.0e-4
      max_steps: 10000
      early_stop_loss: 0.01
      early_stop_patience: 200

  # 阶段 6: 5 类事实
  - name: "6_fact5"
    data:
      num_train: 5000
      num_facts: 5
      max_pre_filler: 2
      no_overwrite: true
      min_distance: 1
      max_distance: 5
      max_turns: 16
    training:
      episode_length: 16
      tbptt_steps: 16
      batch_size: 1
      grad_accum_steps: 4
      learning_rate: 1.0e-4
      max_steps: 10000
      early_stop_loss: 0.01
      early_stop_patience: 200

  # 阶段 7: 8 类事实 — 全部类别
  - name: "7_fact8"
    data:
      num_train: 5000
      num_facts: 8
      max_pre_filler: 2
      no_overwrite: true
      min_distance: 1
      max_distance: 10
      max_turns: 16
    training:
      episode_length: 16
      tbptt_steps: 16
      batch_size: 1
      grad_accum_steps: 4
      learning_rate: 1.0e-4
      max_steps: 10000
      early_stop_loss: 0.05
      early_stop_patience: 200

  # 阶段 8: 覆写能力
  # 8 类事实 + 40% 覆写
  - name: "7_overwrite"
    data:
      num_train: 5000
      num_facts: 8
      max_pre_filler: 2
      overwrite_ratio: 0.4
      min_distance: 1
      max_distance: 10
      max_turns: 16
    training:
      episode_length: 16
      tbptt_steps: 16
      batch_size: 1
      grad_accum_steps: 4
      learning_rate: 1.0e-4
      max_steps: 10000
      early_stop_loss: 0.05
      early_stop_patience: 200
